<!DOCTYPE html>
<html lang="id">

<head>
  <meta charset="UTF-8">
  <title>Kajian Islami – Full Screen 4K Overlay</title>
  <link rel="stylesheet" href="assets/style.css">
</head>

<body class="canvas-4k">
  <div id="overlay-root">

    <!-- ▸ SCREEN CORNER ORNAMENTS (all 4 corners) -->
    <div id="corner-tl" class="screen-corner">
      <svg viewBox="0 0 120 120">
        <path d="M8 112 L8 8 L112 8 M8 28 L28 28 L28 8 M8 48 L48 48 L48 8 M28 48 L48 28" />
      </svg>
    </div>
    <div id="corner-tr" class="screen-corner">
      <svg viewBox="0 0 120 120">
        <path d="M8 112 L8 8 L112 8 M8 28 L28 28 L28 8 M8 48 L48 48 L48 8 M28 48 L48 28" />
      </svg>
    </div>
    <div id="corner-bl" class="screen-corner">
      <svg viewBox="0 0 120 120">
        <path d="M8 112 L8 8 L112 8 M8 28 L28 28 L28 8 M8 48 L48 48 L48 8 M28 48 L48 28" />
      </svg>
    </div>
    <div id="corner-br" class="screen-corner">
      <svg viewBox="0 0 120 120">
        <path d="M8 112 L8 8 L112 8 M8 28 L28 28 L28 8 M8 48 L48 48 L48 8 M28 48 L48 28" />
      </svg>
    </div>

    <!-- ▸ TOP-LEFT BRANDING WIDGET -->
    <div id="hud-left">
      <div class="hud-card-border">
        <div class="hud-card-body">
          <div class="brand-logo-ring">
            <img src="assets/logo.png" alt="Logo"
              onerror="this.style.display='none';document.getElementById('brand-logo-fb').style.display='block';">
            <div id="brand-logo-fb" class="brand-logo-fallback" style="display:none;"></div>
          </div>
          <div class="brand-text">
            <span id="hud-brand-name" class="brand-name">MEDIA KAJIAN ISLAMI</span>
            <span class="brand-tagline">Masjid Nurul Huda Depok</span>
          </div>
        </div>
      </div>
    </div>

    <!-- ▸ TOP-RIGHT LIVE + CLOCK WIDGET -->
    <div id="hud-right">
      <div class="hud-card-border">
        <div class="hud-card-body">
          <div id="hud-live-pill" class="live-pill">
            <div class="live-dot"></div>
            Siaran Langsung
          </div>
          <div class="hud-sep"></div>
          <div class="clock-block">
            <span id="hud-date"></span>
            <span id="hud-time"></span>
          </div>
        </div>
      </div>
    </div>

    <!-- ▸ LOWER THIRD -->
    <div id="lower-third">
      <div class="lt-border">
        <div class="lt-inner">
          <!-- Islamic corner ornaments inside the card -->
          <svg class="lt-corner tl" viewBox="0 0 70 70">
            <path d="M5 65 L5 5 L65 5 M5 20 L20 20 L20 5 M5 35 L35 35 L35 5 M20 35 L35 20" />
          </svg>
          <svg class="lt-corner tr" viewBox="0 0 70 70">
            <path d="M5 65 L5 5 L65 5 M5 20 L20 20 L20 5 M5 35 L35 35 L35 5 M20 35 L35 20" />
          </svg>
          <svg class="lt-corner bl" viewBox="0 0 70 70">
            <path d="M5 65 L5 5 L65 5 M5 20 L20 20 L20 5 M5 35 L35 35 L35 5 M20 35 L35 20" />
          </svg>
          <svg class="lt-corner br" viewBox="0 0 70 70">
            <path d="M5 65 L5 5 L65 5 M5 20 L20 20 L20 5 M5 35 L35 35 L35 5 M20 35 L35 20" />
          </svg>

          <!-- Logo circle -->
          <div class="lt-logo-ring">
            <img src="assets/logo.png" alt="Logo"
              onerror="this.style.display='none';document.getElementById('lt-logo-fb').style.display='block';">
            <div id="lt-logo-fb" class="lt-logo-fallback" style="display:none;"></div>
            <div class="lt-logo-inner-ring"></div>
          </div>

          <!-- Text details -->
          <div class="lt-text">
            <div class="lt-badges">
              <span id="lt-badge" class="lt-cat-badge">KAJIAN ISLAMI</span>
              <span id="lt-live" class="lt-live-badge">LIVE</span>
            </div>
            <div id="lt-speaker" class="lt-speaker">Ustadz Dr. Khalid Basalamah, Lc., M.A.</div>
            <div id="lt-title" class="lt-title">Sebab-Sebab Lapang Dada</div>
          </div>
          <div id="lt-quote" class="lt-quote">
            <div id="lt-quote-text" class="lt-quote-text">"Bukankah Kami telah melapangkan dadamu?"</div>
            <div id="lt-quote-ref" class="lt-quote-ref">QS. Asy-Syarh: 1</div>
          </div>
        </div>
      </div>
    </div>

    <!-- ▸ TICKER / RUNNING TEXT -->
    <div id="ticker">
      <div id="ticker-label">INFO KAJIAN</div>
      <div class="ticker-content">
        <div id="ticker-marquee">
          <div class="ticker-item" id="tick1"></div>
          <div class="ticker-item" id="tick2"></div>
        </div>
      </div>
    </div>

  </div>

  <script>
    // ─── Element refs ─────────────────────────────────────────────
    const hudLeft = document.getElementById('hud-left');
    const hudRight = document.getElementById('hud-right');
    const hudTime = document.getElementById('hud-time');
    const hudDate = document.getElementById('hud-date');
    const hudBrandName = document.getElementById('hud-brand-name');

    const lowerThird = document.getElementById('lower-third');
    const ltBadge = document.getElementById('lt-badge');
    const ltLive = document.getElementById('lt-live');
    const ltSpeaker = document.getElementById('lt-speaker');
    const ltTitle = document.getElementById('lt-title');
    const ltQuoteBox = document.getElementById('lt-quote');
    const ltQuoteText = document.getElementById('lt-quote-text');
    const ltQuoteRef = document.getElementById('lt-quote-ref');

    const ticker = document.getElementById('ticker');
    const tickerLabel = document.getElementById('ticker-label');
    const tickerMarq = document.getElementById('ticker-marquee');
    const tick1 = document.getElementById('tick1');
    const tick2 = document.getElementById('tick2');

    const corners = document.querySelectorAll('.screen-corner');

    // ─── Live clock ───────────────────────────────────────────────
    const DAY_ID = ['Minggu', 'Senin', 'Selasa', 'Rabu', 'Kamis', 'Jumat', 'Sabtu'];
    const MON_ID = ['Jan', 'Feb', 'Mar', 'Apr', 'Mei', 'Jun', 'Jul', 'Agu', 'Sep', 'Okt', 'Nov', 'Des'];

    function updateClock() {
      const now = new Date();
      hudTime.textContent = now.toTimeString().split(' ')[0];
      hudDate.textContent = `${DAY_ID[now.getDay()]} , ${now.getDate()} ${MON_ID[now.getMonth()]} ${now.getFullYear()}`;
    }
    updateClock();
    setInterval(updateClock, 1000);

    // ─── Text fade helper ─────────────────────────────────────────
    function fadeTo(el, text) {
      if (el.textContent === text) return;
      el.style.opacity = '0';
      setTimeout(() => { el.textContent = text; el.style.opacity = '1'; }, 250);
    }

    // ─── State cache for diffing ──────────────────────────────────
    const prev = {
      headerActive: null,
      lowerThirdActive: null,
      speaker: null,
      title: null,
      badge: null,
      isLive: null,
      quote: null,
      quoteRef: null,
      tickerVisible: null,
      tickerText: null,
      tickerLabel: null,
      elementScale: null
    };

    function applyScale(state) {
      const scale = parseFloat(state.elementScale) || 1;
      if (scale === prev.elementScale) return;
      prev.elementScale = scale;
      document.documentElement.style.setProperty('--element-scale', scale);
    }

    function applyHUD(state) {
      const active = state.headerActive !== false;
      if (active === prev.headerActive) return;
      prev.headerActive = active;

      [hudLeft, hudRight].forEach(w => w.classList.toggle('active', active));
      corners.forEach(c => c.classList.toggle('active', active));
    }

    function applyLowerThird(state) {
      const ltActive = !!state.lowerThirdActive;

      if (!ltActive) {
        if (prev.lowerThirdActive !== false) {
          lowerThird.classList.remove('active');
          prev.lowerThirdActive = false;
        }
        return;
      }

      const changed =
        ltActive !== prev.lowerThirdActive ||
        state.speaker !== prev.speaker ||
        state.title !== prev.title ||
        state.badge !== prev.badge ||
        state.isLive !== prev.isLive ||
        state.quote !== prev.quote ||
        state.quoteRef !== prev.quoteRef;

      if (!changed) return;

      prev.lowerThirdActive = true;
      prev.speaker = state.speaker;
      prev.title = state.title;
      prev.badge = state.badge;
      prev.isLive = state.isLive;
      prev.quote = state.quote;
      prev.quoteRef = state.quoteRef;

      fadeTo(ltSpeaker, state.speaker || '');
      fadeTo(ltTitle, state.title || '');

      if ((state.badge || 'KAJIAN ISLAMI') !== ltBadge.textContent) {
        ltBadge.textContent = state.badge || 'KAJIAN ISLAMI';
      }

      ltLive.style.display = state.isLive ? 'flex' : 'none';

      if (state.quote) {
        const qText = `"${state.quote}"`;
        if (ltQuoteText.textContent !== qText) ltQuoteText.textContent = qText;
        if (ltQuoteRef.textContent !== (state.quoteRef || '')) ltQuoteRef.textContent = state.quoteRef || '';
        ltQuoteBox.classList.add('active');
      } else {
        ltQuoteBox.classList.remove('active');
      }

      lowerThird.classList.add('active');
    }

    function buildTickerText(raw) {
      if (!raw) return '';
      let out = raw.trim();
      while (out.length < 180) out += '   ✦   ' + raw.trim();
      return out;
    }

    function applyTicker(state) {
      const vis = !!state.tickerVisible;
      const raw = state.tickerText || '';
      const label = state.tickerLabel || '';

      if (vis !== prev.tickerVisible) {
        prev.tickerVisible = vis;
        ticker.classList.toggle('active', vis);
        if (!vis) return;
      }
      if (!vis) return;

      ticker.classList.add('active');

      if (label !== prev.tickerLabel) {
        prev.tickerLabel = label;
        tickerLabel.textContent = label;
      }

      if (raw !== prev.tickerText) {
        prev.tickerText = raw;
        const formatted = buildTickerText(raw);

        tickerMarq.style.animationPlayState = 'paused';
        tick1.textContent = formatted;
        tick2.textContent = formatted;

        // Force reflow
        tickerMarq.offsetHeight;

        const dur = Math.max(20, Math.min(110, formatted.length * 0.14));
        tickerMarq.style.animation = 'none';
        tickerMarq.offsetHeight;
        tickerMarq.style.animation = `marquee ${dur}s linear infinite`;
      }
    }

    async function poll() {
      try {
        const res = await fetch('/api/state?client=overlay');
        if (!res.ok) return;
        const state = await res.json();

        applyScale(state);
        applyHUD(state);
        applyLowerThird(state);
        applyTicker(state);

        if (state.brandName) {
          hudBrandName.textContent = state.brandName;
        }
      } catch (e) {
        // Server not running yet
      }
    }

    setInterval(poll, 250);
    poll();
  </script>
</body>

</html>
